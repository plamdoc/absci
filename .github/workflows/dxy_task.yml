name: DXY Auto Read

on:
  workflow_dispatch:
  schedule:
    # 北京时间每40分钟运行一次（均匀间隔：00:00, 00:40, 01:20, 02:00, 02:40...）
    - cron: '0,40 */2 * * *'   # 偶数小时（UTC）的0分和40分
    - cron: '20 1-23/2 * * *'  # 奇数小时（UTC）的20分
jobs:
  run-dxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 开启 pip 缓存，加速后续运行

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 优先读取 requirements.txt，如果没有则手动安装 requests 和 playwright
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests playwright
          fi
          # 安装 Playwright 浏览器内核及系统依赖
          python -m playwright install --with-deps chromium

      - name: Run DXY Script
        id: read_task
        run: |
          echo "========== 开始执行丁香园阅读任务 =========="
          # 执行脚本并将输出重定向到 output.log
          python dxy_read.py > output.log 2>&1
          
          # 使用 EOF 语法将多行日志打包注入到环境变量中，方便推送
          echo "LOG_CONTENT<<EOF" >> $GITHUB_ENV
          cat output.log >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GITHUB_ACTIONS: true
          TZ: Asia/Shanghai  # 强制统一为北京时间
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
          SCKEY: ${{ secrets.SCKEY }}

      - name: Display Log
        run: |
          echo "========== 提取的多行日志内容 =========="
          echo "${{ env.LOG_CONTENT }}"
