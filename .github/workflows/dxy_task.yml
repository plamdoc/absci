name: 丁香园自动阅读 (Server酱推送版)

on:
  schedule:
    # 北京时间凌晨低频运行：00:15、02:15、04:15、06:15
    - cron: '15 16,18,20,22 * * *'
    # 北京时间白天高频运行：08:15 到 23:15 每小时一次
    - cron: '15 0-15 * * *'
  workflow_dispatch:

jobs:
  run-dxy-task:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4

      - name: 显示触发信息
        run: |
          echo "触发方式: ${{ github.event_name }}"
          echo "当前 UTC 时间:"
          date -u
          echo "当前北京时间:"
          TZ='Asia/Shanghai' date

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: 运行阅读脚本
        env:
          GITHUB_ACTIONS: true
          TZ: Asia/Shanghai
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
          SCKEY: ${{ secrets.SCKEY }}
        run: |
          echo "========== 开始运行 dxy_read.py =========="
          python dxy_read.py
          echo "========== 脚本运行结束 =========="
