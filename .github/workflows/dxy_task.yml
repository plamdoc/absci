name: DXY Auto Read

on:
  workflow_dispatch:
  schedule:
    # 北京时间每40分钟运行一次（原Cron完全正确，无需修改）
    # 对应UTC时间：偶数小时0/40分，奇数小时20分 → 转换为北京时间正好全天均匀间隔
    - cron: '0,40 */2 * * *'
    - cron: '20 1-23/2 * * *'

jobs:
  run-dxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 新增：缓存Playwright浏览器内核，大幅提速
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests playwright
          fi
          # 仅当缓存未命中时才安装浏览器
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" != 'true' ]; then
            python -m playwright install --with-deps chromium
          fi

      - name: Run DXY Script
        id: read_task
        continue-on-error: true  # 关键：脚本失败时继续执行后续步骤
        run: |
          echo "========== 开始执行丁香园阅读任务 =========="
          # 确保日志文件存在，即使脚本执行失败
          touch output.log
          # 执行脚本并实时输出日志（同时保存到文件）
          python -u dxy_read.py 2>&1 | tee output.log
        env:
          GITHUB_ACTIONS: true
          TZ: Asia/Shanghai
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
          SCKEY: ${{ secrets.SCKEY }}

      - name: Display Full Log
        if: always()  # 关键：无论前面步骤是否失败，都显示日志
        run: |
          echo "========== 完整执行日志 =========="
          cat output.log

      # 新增：Server酱推送执行结果（可选但强烈推荐）
      - name: Send Notification via ServerChan
        if: always()
        run: |
          # 判断任务是否成功
          if [ "${{ steps.read_task.outcome }}" = "success" ]; then
            STATUS="✅ 任务成功"
          else
            STATUS="❌ 任务失败"
          fi
          
          # 读取日志前1000行（避免推送内容过长）
          LOG=$(tail -n 1000 output.log | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          # 构造推送内容
          TITLE="丁香园自动阅读 - $STATUS"
          CONTENT="### 执行结果\n$STATUS\n\n### 日志摘要\n\`\`\`\n$LOG\n\`\`\`"
          
          # 发送推送（仅当配置了SCKEY时）
          if [ -n "$SCKEY" ]; then
            curl -s "https://sctapi.ftqq.com/$SCKEY.send" \
              -d "title=$TITLE" \
              -d "desp=$CONTENT"
            echo "通知已发送"
          else
            echo "未配置SCKEY，跳过通知"
          fi
        env:
          SCKEY: ${{ secrets.SCKEY }}
