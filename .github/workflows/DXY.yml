name: DXY Auto Read

on:
  workflow_dispatch:
  schedule:
    # ✅ 北京时间每30分钟运行一次（完美覆盖全天整点+半点）
    # 原理：UTC时间的0分/30分 → 加8小时后北京时间分钟仍为0分/30分
    # 对应时间点：UTC 16:00→北京00:00, UTC16:30→北京00:30 ... UTC15:30→北京23:30
    - cron: '*/30 * * * *'

jobs:
  run-dxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: cache-playwright
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests playwright
          fi
          if [ "${{ steps.cache-playwright.outputs.cache-hit }}" != 'true' ]; then
            python -m playwright install --with-deps chromium
          fi

      - name: Run DXY Script
        id: read_task
        continue-on-error: true
        run: |
          echo "========== 开始执行丁香园阅读任务 =========="
          touch output.log
          python -u dxy_read.py 2>&1 | tee output.log
        env:
          GITHUB_ACTIONS: true
          TZ: Asia/Shanghai
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
          SCKEY: ${{ secrets.SCKEY }}

      - name: Display Full Log
        if: always()
        run: |
          echo "========== 完整执行日志 =========="
          cat output.log

      - name: Send Notification via ServerChan
        if: always()
        run: |
          if [ "${{ steps.read_task.outcome }}" = "success" ]; then
            STATUS="✅ 任务成功"
          else
            STATUS="❌ 任务失败"
          fi
          
          LOG=$(tail -n 1000 output.log | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          TITLE="丁香园自动阅读 - $STATUS"
          CONTENT="### 执行结果\n$STATUS\n\n### 日志摘要\n\`\`\`\n$LOG\n\`\`\`"
          
          if [ -n "$SCKEY" ]; then
            curl -s "https://sctapi.ftqq.com/$SCKEY.send" \
              -d "title=$TITLE" \
              -d "desp=$CONTENT"
            echo "通知已发送"
          else
            echo "未配置SCKEY，跳过通知"
          fi
        env:
          SCKEY: ${{ secrets.SCKEY }}
